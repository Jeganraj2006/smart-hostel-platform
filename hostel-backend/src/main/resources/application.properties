# ??? App Config ???????????????????????????????????????????
spring.application.name=hostel-backend
server.port=8080

# 🍃 MongoDB (falls back to local instance for dev)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/hostel_db}

# 🔴 Redis (falls back to local instance for dev; SSL disabled locally)
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}

# 🔑 JWT Config — DEV-ONLY fallback secret; MUST be overridden in production
jwt.secret=${JWT_SECRET:dev-only-insecure-jwt-secret-change-in-production-32chars}
jwt.access.expiration=900000
jwt.refresh.expiration=604800000

# 📧 Email (Resend via SMTP) — falls back to empty; NotificationService handles blank credentials gracefully
spring.mail.host=${MAIL_HOST:smtp.resend.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

# ☁️ Cloudinary — falls back to empty strings; upload features are no-op when blank
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# 📁 File Upload Size Limit
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# 📋 Logging
logging.level.org.springframework.security=WARN
logging.level.com.hostel=DEBUG
