name: CI Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Run Backend Tests
        run: |
          cd hostel-backend
          mvn test

  frontend-build-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: hostel-frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd hostel-frontend
          npm ci

      - name: Lint Frontend
        run: |
          cd hostel-frontend
          npm run lint

      - name: Build Frontend
        run: |
          cd hostel-frontend
          npm run build
